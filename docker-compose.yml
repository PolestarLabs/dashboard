version: "3.8"

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api/src:/app/src
      - ./api/scripts:/app/scripts
    environment:
      - MONGO_URL=${DB_INFO}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_PORT=7056
      - MASTER_API_TOKEN=${MASTER_API_TOKEN}
      - DB_INFO=${DB_INFO}
      - DASHPORT=${DASHPORT}
      - HOST=${HOST}
      - CLIENTS=${CLIENTS}
      - HOST=${HOST}
    ports:
      - "7056:7056"
    depends_on:
      - mongo
      - redis

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/app/src 
    environment:
      - DB_INFO=${DB_INFO}
      - HOST=${HOST}
      - CLIENTS=${CLIENTS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DASHPORT=4728
    ports:
      - "4728:4728"
    depends_on:
      - mongo
      - redis

volumes:
  mongo_data:
