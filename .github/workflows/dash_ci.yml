name: Dashboard CI
on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        description: "Target environment"
        options: [staging, production]
        default: staging

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

# ── Staging pipeline (dev branch) ──────────────────────────────────────────

jobs:
  pull-staging:
    name: 🔁 Sync Staging
    if: >
      github.ref == 'refs/heads/dev' ||
      github.event_name == 'pull_request' && github.base_ref == 'dev' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    env:
      DIR: ${{ secrets.DASH_DIR_DEV }}
    runs-on: self-hosted
    steps:
      - name: Sync with repository
        run: |
          cd "$DIR"
          git fetch origin
          git reset --hard origin/dev

  deps-staging:
    name: 📦 Dependencies (Staging)
    needs: pull-staging
    runs-on: self-hosted
    env:
      DIR: ${{ secrets.DASH_DIR_DEV }}
    steps:
      - name: Install dev dependencies
        run: |
          cd "$DIR"
          npm install --include=dev

      - name: Install all dependencies
        run: |
          cd "$DIR"
          npm install

      - name: Run postinstall helper
        run: |
          cd "$DIR"
          if node ./scripts/postinstall.js; then
            echo "[CI] postinstall succeeded"
          else
            echo "[CI] postinstall failed" >&2
            # on staging/dev we log and continue, but master (production) aborts
            if [[ '${{ github.ref }}' == 'refs/heads/master' ]] || \
               ( [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ "${{ inputs.environment }}" == "production" ]] ); then
              echo "[CI] production build: aborting due to postinstall failure" >&2
              exit 1
            else
              echo "[CI] non-production build: continuing despite postinstall failure" >&2
            fi
          fi

  deploy-staging:
    name: 🧪 Deploy → Staging
    needs: deps-staging
    runs-on: self-hosted
    steps:
      - name: Reload PM2 staging processes
        run: /home/pollux/polaris/scripts/server-deploy.sh dashboard staging

  # ── Production pipeline (master branch) ──────────────────────────────────

  pull-production:
    name: 🔁 Sync Production
    if: >
      github.ref == 'refs/heads/master' ||
      github.event_name == 'pull_request' && github.base_ref == 'master' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    env:
      DIR: ${{ secrets.DASH_DIR_PROD }}
    runs-on: self-hosted
    steps:
      - name: Sync with repository
        run: |
          cd "$DIR"
          git fetch origin
          git reset --hard origin/master

  deps-production:
    name: 📦 Dependencies (Production)
    needs: pull-production
    runs-on: self-hosted
    env:
      DIR: ${{ secrets.DASH_DIR_PROD }}
    steps:
      - name: Install all dependencies
        run: |
          cd "$DIR"
          npm install

      - name: Run postinstall helper
        run: |
          cd "$DIR"
          if node ./scripts/postinstall.js; then
            echo "[CI] postinstall succeeded"
          else
            echo "[CI] postinstall failed" >&2
            echo "[CI] production build: aborting due to postinstall failure" >&2
            exit 1
          fi

  deploy-production:
    name: 🚀 Deploy → Production
    needs: deps-production
    runs-on: self-hosted
    steps:
      - name: Reload PM2 production processes
        run: /home/pollux/polaris/scripts/server-deploy.sh dashboard production
