name: Dashboard CI
on:
  push:
    branches: [dev, master]
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        description: "Target environment"
        options: [staging, production]
        default: staging

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

# ── Staging pipeline (dev branch) ──────────────────────────────────────────

jobs:
  pull-staging:
    name: 🔁 Sync Staging
    if: >
      github.ref == 'refs/heads/dev' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    env:
      DIR: ${{ secrets.DASH_DIR_DEV }}
    runs-on: self-hosted
    steps:
      - name: Sync with repository
        run: |
          cd "$DIR"
          git fetch origin
          git reset --hard origin/dev

  deps-staging:
    name: 📦 Dependencies (Staging)
    needs: pull-staging
    runs-on: self-hosted
    env:
      DIR: ${{ secrets.DASH_DIR_DEV }}
    steps:
      - name: Spawn standby runner
        run: pm2 start "GitHub Runner 2" || true

      - name: Install dev dependencies
        run: |
          cd "$DIR"
          npm install --include=dev

      - name: Install all dependencies
        run: |
          cd "$DIR"
          npm install
        continue-on-error: false

      - name: Stop standby runner
        if: always()
        run: pm2 stop "GitHub Runner 2" || true

  build-staging:
    name: 🥤 Build (Staging)
    needs: deps-staging
    runs-on: self-hosted
    env:
      DIR: ${{ secrets.DASH_DIR_DEV }}
    steps:
      - name: Gulp build (no assets — fast)
        run: |
          cd "$DIR"
          npx gulp buildNoAssets

  deploy-staging:
    name: 🧪 Deploy → Staging
    needs: build-staging
    runs-on: self-hosted
    steps:
      - name: Reload PM2 staging processes
        run: /home/pollux/polaris/scripts/server-deploy.sh dashboard staging

  # ── Production pipeline (master branch) ──────────────────────────────────

  pull-production:
    name: 🔁 Sync Production
    if: >
      github.ref == 'refs/heads/master' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    env:
      DIR: ${{ secrets.DASH_DIR_PROD }}
    runs-on: self-hosted
    steps:
      - name: Sync with repository
        run: |
          cd "$DIR"
          git fetch origin
          git reset --hard origin/master

  deps-production:
    name: 📦 Dependencies (Production)
    needs: pull-production
    runs-on: self-hosted
    env:
      DIR: ${{ secrets.DASH_DIR_PROD }}
    steps:
      - name: Spawn standby runner
        run: pm2 start "GitHub Runner 2" || true

      - name: Install all dependencies
        run: |
          cd "$DIR"
          npm install

      - name: Stop standby runner
        if: always()
        run: pm2 stop "GitHub Runner 2" || true

  build-production:
    name: 🥤 Build (Production)
    needs: deps-production
    runs-on: self-hosted
    env:
      DIR: ${{ secrets.DASH_DIR_PROD }}
    steps:
      - name: Gulp build (full)
        run: |
          cd "$DIR"
          npx gulp build

  deploy-production:
    name: 🚀 Deploy → Production
    needs: build-production
    runs-on: self-hosted
    steps:
      - name: Reload PM2 production processes
        run: /home/pollux/polaris/scripts/server-deploy.sh dashboard production
