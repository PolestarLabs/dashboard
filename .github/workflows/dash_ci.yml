name: Dashboard CI

on:
  push:
    branches: [dev, master, elysia]
    paths:
      - 'api/**'
      - '!api/**'   # always run gate regardless of path
  pull_request:
    branches: [dev, master, elysia]
    paths:
      - 'api/**'
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        description: "Target environment"
        options: [staging, production]
        default: staging

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-root:
    name: ⛔ Root gate (dashboard deps)
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      non_api_changed: ${{ steps.diff.outputs.non_api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute changed paths
        id: diff
        run: |
          git fetch origin
          base=$([[ "${{ github.event_name }}" == "push" ]] && echo "${{ github.event.before }}" || echo "origin/${{ github.event.pull_request.base.ref }}")
          # verify base exists, fallback to before SHA if not
          if ! git rev-parse --verify "$base" >/dev/null 2>&1; then
            echo "warning: base ref '$base' not found, using event.before" >&2
            base="${{ github.event.before }}"
          fi
          git diff --name-only $base ${{ github.sha }} > changed.txt
          if grep -qv '^api/' changed.txt; then
            echo "non_api=true" >> $GITHUB_OUTPUT
          else
            echo "non_api=false" >> $GITHUB_OUTPUT
          fi
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache root node_modules
        id: cache
        uses: actions/cache@v3
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-root-deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-root-deps-
      - name: Install root deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          # configure git so npm can fetch private repo dependencies
          git config --global credential.helper store
          echo "https://${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          npm ci


  gate-bun:
    name: 🧄 Bun gate (API deps)
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      api_changed: ${{ steps.diff.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute changed paths
        id: diff
        run: |
          git fetch origin
          base=$([[ "${{ github.event_name }}" == "push" ]] && echo "${{ github.event.before }}" || echo "origin/${{ github.event.pull_request.base.ref }}")
          if ! git rev-parse --verify "$base" >/dev/null 2>&1; then
            echo "warning: base ref '$base' not found, using event.before" >&2
            base="${{ github.event.before }}"
          fi
          git diff --name-only $base ${{ github.sha }} > changed.txt
          if grep -q '^api/' changed.txt; then
            echo "api=true" >> $GITHUB_OUTPUT
          else
            echo "api=false" >> $GITHUB_OUTPUT
          fi
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install bun runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: 🐇 Install API deps (bun)
        run: |
          cd api
          # ensure git can fetch private repos
          git config --global credential.helper store
          echo "https://${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          bun install


  gate:
    name: ✅ Combined gate
    needs: [gate-root, gate-bun]
    runs-on: ubuntu-latest
    outputs:
      non_api_changed: ${{ needs.gate-root.outputs.non_api_changed }}
      api_changed: ${{ needs.gate-bun.outputs.api_changed }}
    steps:
      - name: final gate check
        run: echo "Gate jobs completed successfully"

  typecheck:
    name: 🧠 Run TypeScript typecheck
    needs: [build-dist, elysia-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install API deps
        run: |
          cd api
          # ensure git can fetch private repos
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          bun install
      - name: Type-check API
        run: |
          cd api
          bun run typecheck
      # this job is informational only; other jobs do not depend on it

  build-dist:
    name: 📦 Build Elysia API bundle
    needs: gate-bun
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install API deps
        run: |
          cd api
          # ensure git can fetch private repos
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          bun install
      - name: Build bundle
        run: |
          cd api
          bun build src/index.ts --bundle --target=bun --format=cjs --outdir=dist
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: elysia-bundle
          path: api/dist

  sanity-tests:
    name: 🔬 API sanity tests
    needs: [build-dist, elysia-check]
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install API deps
        run: |
          cd api
          # ensure git can fetch private repos
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          bun install
      - name: Run sanity suite
        run: |
          cd api
          bun run test:sanity
      - name: Upload fixtures artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanity-fixtures
          path: api/src/__tests__/img/fixtures

  full-tests:
    name: ✅ API full tests
    needs: sanity-tests
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Download fixtures
        uses: actions/download-artifact@v4
        with:
          name: sanity-fixtures
          path: api/src/__tests__/img/fixtures
      - name: Install API deps
        run: |
          cd api
          # configure git for private git deps
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          bun install
      - name: Run full API tests
        run: |
          cd api
          bun test


  fastlane:
    name: 🚄 Fastlane label control
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      has_fastlane: ${{ steps.labelcheck.outputs.has }}
    steps:
      - uses: actions/checkout@v4
      - name: Check fastlane label
        id: labelcheck
        run: |
          labels=$(jq -r '.pull_request.labels[].name' < $GITHUB_EVENT_PATH || echo "")
          echo "labels=$labels" >> $GITHUB_OUTPUT
          if echo "$labels" | grep -q '^fastlane$'; then echo "has=1" >> $GITHUB_OUTPUT; else echo "has=0" >> $GITHUB_OUTPUT; fi
      - name: Enforce single fastlane PR
        if: steps.labelcheck.outputs.has == '1'
        run: |
          prs=$(gh pr list --label fastlane --state open --json number --jq '.[].number')
          count=$(echo "$prs" | grep -c .)
          if [ "$count" -gt 1 ]; then
            echo "Multiple fastlane PRs exist: $prs" >&2
            gh pr edit ${{ github.event.number }} --remove-label fastlane
            echo "Removed fastlane label from current PR" >&2
          fi


  staging:
    needs: gate-root
    uses: ./.github/workflows/staging.yml
    secrets: inherit
    if: >
      (needs.gate-root.outputs.non_api_changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'dev' && contains(github.event.pull_request.labels.*.name, 'fastlane'))

  production:
    needs: gate
    uses: ./.github/workflows/production.yml
    secrets: inherit
    if: >
      needs.gate.outputs.non_api_changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/master'
  
  elysia-check:
    needs: gate-bun
    name: ✨ Elysia deps & postinstall
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install bun runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install API deps (bun)
        run: |
          cd api
          # configure git for private git deps
          git config --global credential.helper store
          echo "https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          bun install
      - name: Run postinstall
        run: |
          cd api
          bun ./scripts/postinstall.js



  elysia-deploy:
    name: 🎈 Elysia deploy → staging
    needs: [elysia-check,build-dist]
    runs-on: self-hosted
    env:
      DIR: ${{ secrets.DASH_DIR_DEV }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Sync api folder
        run: |
          set -e
          cd "$DIR"
          git fetch origin
          # always pull from elysia branch regardless of triggering ref
          git checkout origin/elysia -- api
      - name: Build
        run: |
          cd "$DIR"/api
          bun build src/index.ts --bundle --target=bun --format=cjs --outdir=dist
      - name: Restart api-dev
        run: pm2 restart api-dev
