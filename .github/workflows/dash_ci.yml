name: Dashboard CI

on:
  push:
    branches: [dev, master, elysia]
    paths:
      - 'api/**'
      - '!api/**'   # always run gate regardless of path
  pull_request:
    branches: [dev, master, elysia]
    paths:
      - 'api/**'
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        description: "Target environment"
        options: [staging, production]
        default: staging

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-root:
    uses: ./.github/workflows/gate-root.yml
    secrets: inherit

  gate-bun:
    uses: ./.github/workflows/gate-bun.yml
    secrets: inherit

  gate:
    needs: [gate-root, gate-bun]
    uses: ./.github/workflows/gate.yml
    secrets: inherit

  fastlane:
    uses: ./.github/workflows/fastlane.yml
    secrets: inherit

  pull-staging:
    needs: gate-root
    uses: ./.github/workflows/pull-staging.yml
    secrets: inherit
    if: >
      (needs.gate-root.outputs.non_api_changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'dev' && contains(github.event.pull_request.labels.*.name, 'fastlane'))

  pull-production:
    needs: gate-root
    uses: ./.github/workflows/pull-production.yml
    secrets: inherit
    if: >
      needs.gate-root.outputs.non_api_changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/master'

  deploy-staging:
    needs: pull-staging
    uses: ./.github/workflows/deploy-staging.yml
    secrets: inherit
    if: needs.pull-staging.result == 'success'

  deploy-production:
    needs: pull-production
    uses: ./.github/workflows/deploy-production.yml
    secrets: inherit
    if: needs.pull-production.result == 'success'



  elysia-check:
    needs: gate-bun
    uses: ./.github/workflows/elysia-check.yml
    secrets: inherit
    if: needs.gate-bun.outputs.api_changed == 'true'

  elysia-deploy:
    needs: elysia-check
    uses: ./.github/workflows/elysia-deploy.yml
    secrets: inherit
    if: needs.gate-bun.outputs.api_changed == 'true'
