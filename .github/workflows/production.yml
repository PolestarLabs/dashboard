name: Deploy Production

on:
  workflow_call:

jobs:
  pull-production:
    name: 🔄️ Sync Production
    runs-on: self-hosted
    env:
      DIR: ${{ secrets.DASH_DIR_PROD }}
    steps:
      - name: Backup current state
        run: |
          cd "$DIR"
          git rev-parse HEAD > /tmp/oldrev
          tar -czf /tmp/node_modules.tar.gz node_modules || true
      - name: Sync repo
        run: |
          cd "$DIR"
          git fetch origin
          git reset --hard origin/master

  deps-production:
    name: 📦 Dependencies (Production)
    runs-on: self-hosted
    needs: pull-production
    env:
      DIR: ${{ secrets.DASH_DIR_PROD }}
    steps:
      - name: Install dependencies
        run: |
          set -e
          cd "$DIR"
          npm install
      - name: Rollback on failure
        if: failure()
        run: |
          cd "$DIR"
          tar -xzf /tmp/node_modules.tar.gz
          git checkout $(cat /tmp/oldrev)
          exit 1

  deploy-production:
    name: 🚀 Deploy → Production
    environment:
      name: "live"
      url: https://pollux.gg
    runs-on: self-hosted
    needs: deps-production
    steps:
      - run: |
          /home/pollux/polaris/scripts/server-deploy.sh dashboard production

  rollback-production:
    name: 🔄 Rollback Production
    runs-on: self-hosted
    needs: deploy-production
    if: failure()
    env:
      DIR: ${{ secrets.DASH_DIR_PROD }}
    steps:
      - name: Restore previous state
        run: |
          echo "rolling back code and dependencies"
          cd "$DIR"
          tar -xzf /tmp/node_modules.tar.gz
          git checkout $(cat /tmp/oldrev)
          exit 1