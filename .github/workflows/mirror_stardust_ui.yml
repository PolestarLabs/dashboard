name: Mirror Stardust UI

on:
  push:
    branches: [dash-v3]
    paths:
      - 'frontend/src/ui/**'
      - 'frontend/src/stories/**'
      - 'frontend/src/assets/fonts.css'
      - 'frontend/src/assets/tailwind.css'
      - 'frontend/.storybook/**'
      - '.github/workflows/mirror_stardust_ui.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stardust-ui-mirror-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    name: Sync UI source files to Stardust UI
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: andromika/Stardust-UI
      TARGET_BRANCH: main
    steps:
      - name: Checkout dashboard source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Clone Stardust UI target
        run: |
          TOKEN='${{ secrets.STARDUST_UI_PUSH_TOKEN }}'
          git clone --depth=1 --branch "${TARGET_BRANCH}" \
            "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
            /tmp/stardust-target \
            || git clone --depth=1 \
              "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
              /tmp/stardust-target
          cd /tmp/stardust-target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout "${TARGET_BRANCH}" 2>/dev/null || git checkout -b "${TARGET_BRANCH}"

      - name: Create backup branch on Stardust UI
        run: |
          TOKEN='${{ secrets.STARDUST_UI_PUSH_TOKEN }}'
          BACKUP_BRANCH="backup/sync-$(date -u +%Y%m%d-%H%M%S)"
          cd /tmp/stardust-target
          git push "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
            "HEAD:refs/heads/${BACKUP_BRANCH}"
          echo "BACKUP_BRANCH=${BACKUP_BRANCH}" >> "$GITHUB_ENV"
          echo "Created backup branch: ${BACKUP_BRANCH}" >> "$GITHUB_STEP_SUMMARY"

      - name: Sync source files only
        run: |
          # Source files from dashboard → Stardust target locations
          # Config files (package.json, tsconfig.json, vite.config.ts, postcss.config.cjs,
          # tailwind.config.cjs, .gitignore, src/env.d.ts, src/shims-vue.d.ts,
          # .storybook/main.ts, *.md) are NEVER touched — managed manually on Stardust.

          mkdir -p /tmp/stardust-target/src/ui \
                   /tmp/stardust-target/src/stories \
                   /tmp/stardust-target/src/assets \
                   /tmp/stardust-target/.storybook

          # ui components
          rsync -a --delete \
            frontend/src/ui/ \
            /tmp/stardust-target/src/ui/

          # stories
          rsync -a --delete \
            frontend/src/stories/ \
            /tmp/stardust-target/src/stories/

          # individual asset files
          [ -f frontend/src/assets/fonts.css ] && \
            cp frontend/src/assets/fonts.css /tmp/stardust-target/src/assets/fonts.css
          [ -f frontend/src/assets/tailwind.css ] && \
            cp frontend/src/assets/tailwind.css /tmp/stardust-target/src/assets/tailwind.css

          # .storybook — sync everything EXCEPT main.ts (managed on Stardust)
          rsync -a --delete \
            --exclude='main.ts' \
            frontend/.storybook/ \
            /tmp/stardust-target/.storybook/

      - name: Generate sync report
        run: |
          cd /tmp/stardust-target
          git add src/ui/ src/stories/ src/assets/fonts.css src/assets/tailwind.css .storybook/ 2>/dev/null || true
          {
            echo "## Dashboard → Stardust UI Sync"
            echo ""
            echo "**Source:** [\`${{ github.repository }}@${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo "**Target:** \`${TARGET_REPO}@${TARGET_BRANCH}\`"
            echo "**Backup branch:** \`${BACKUP_BRANCH}\`"
            echo ""
            CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
            if [[ "$CHANGED" -eq 0 ]]; then
              echo "### ✅ Nothing changed — target is already up to date"
            else
              echo "### 📝 $CHANGED file(s) changed"
              echo ""
              echo '```'
              git diff --cached --stat
              echo '```'
              echo ""
              echo "<details><summary>File status</summary>"
              echo ""
              echo '```'
              git diff --cached --name-status
              echo '```'
              echo ""
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push to Stardust UI
        run: |
          TOKEN='${{ secrets.STARDUST_UI_PUSH_TOKEN }}'
          cd /tmp/stardust-target
          if [[ -z "$(git diff --cached --name-only)" ]]; then
            echo "Nothing to commit, skipping push."
            exit 0
          fi
          git commit -m "chore: sync UI source files from ${{ github.repository }}

Synced from: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push \
            "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
            "HEAD:refs/heads/${TARGET_BRANCH}"