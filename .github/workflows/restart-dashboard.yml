name: Restart Dashboard

on:
  workflow_dispatch: {}
  repository_dispatch:
    types: [restart]

# trigger via `gh api repos/:owner/:repo/dispatches -f event_type=restart`

jobs:
  restart:
    name: Restart dashboard processes
    runs-on: [self-hosted, polestar-dashboard]
    steps:
      - name: Link to Upstream
        run: |
          echo "### Triggered by Upstream 🔗" >> $GITHUB_STEP_SUMMARY
          echo "This run was started by: [Upstream Workflow Run](https://github.com/${{ github.event.client_payload.upstream_url }})" >> $GITHUB_STEP_SUMMARY
      - name: Checkout (for context)
        uses: actions/checkout@v4
      - name: Restart PM2 dashboard
        run: |
          echo "Restarting dashboard via PM2"
          pm2 restart dash-dev || pm2 restart dash || echo "dashboard process may not be running"
